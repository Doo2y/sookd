<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <input type="text" placeholder="ค้นหารายการอาหาร หรือ กิจกรรม">
    <span class="topnav-search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
  </div>

  <div class="topnav-right">
    <button class="topnav-phone">+66 92 505 4994</button>
    <button class="topnav-icon-btn">ข้อมูลส่วนตัว</button>
    <button class="topnav-icon-btn">รายการโปรด</button>
    <button class="topnav-cart">130.00 บาท</button>

<nav class="subnav">

  <button class="subnav-tab" onclick="showPage('about', this)">เกี่ยวกับเรา</button>
</nav>

<!-- PAGE CONTENT -->
<div id="page-content" class="container"></div>

<!-- FOOD MODAL -->
<div class="modal-overlay" id="food-modal" onclick="closeModalOutside(event)"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">&#10003;</span>
  <span id="toast-msg">บันทึกแล้ว</span>
</div>
