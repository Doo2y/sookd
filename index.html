<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sook D · แคลอรี่และโภชนาการ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/macro.css">
<link rel="stylesheet" href="css/planner.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<!-- ── TOP NAV ── -->
<header class="topnav">
  <div class="topnav-logo">Sook<span>D</span></div>

  <div class="topnav-search">
    <input type="text" placeholder="ค้นหารายการอาหาร หรือ กิจกรรม">
  </div>

  <div class="topnav-right">
    <button class="topnav-phone">+66 92 505 4994</button>
    <button class="topnav-icon-btn">ข้อมูลส่วนตัว</button>
    <button class="topnav-icon-btn">&#9825; รายการโปรด</button>
    <button class="topnav-cart">&#128722; &#3647;130.00</button>
  </div>
</header>

<!-- ── SUB NAV ── -->
<nav class="subnav">
  <button class="subnav-tab active" data-page="home"       onclick="showPage('home', this)">หน้าแรก</button>
  <button class="subnav-tab"        data-page="calc"       onclick="showPage('calc', this)">คำนวณแคลอรี่</button>
  <button class="subnav-tab"        data-page="foods"      onclick="showPage('foods', this)">รายการอาหาร</button>
  <button class="subnav-tab"        data-page="plan"       onclick="showPage('plan', this)">แผนอาหาร</button>
  <button class="subnav-tab"        data-page="history"    onclick="showPage('history', this)">โปรไฟล์</button>
  <button class="subnav-tab"        data-page="activities" onclick="showPage('activities', this)">กิจกรรม</button>
  <button class="subnav-tab"        data-page="articles"   onclick="showPage('articles', this)">บทความ</button>
  <button class="subnav-tab"        data-page="about"      onclick="showPage('about', this)">เกี่ยวกับเรา</button>
</nav>

<!-- ── PAGE CONTENT ── -->
<div id="page-content" class="container"></div>

<!-- ── FOOD MODAL ── -->
<div class="modal-overlay" id="food-modal" onclick="closeModalOutside(event)"></div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✓</span>
  <span id="toast-msg">บันทึกแล้ว</span>
</div>

<script src="js/state.js"></script>
<script src="js/toast.js"></script>
<script src="js/foods.js"></script>
<script src="js/foodspage.js"></script>
<script src="js/calc.js"></script>
<script src="js/macro.js"></script>
<script src="js/planner.js"></script>
<script src="js/modal.js"></script>
<script src="js/history.js"></script>
<script src="js/nav.js"></script>
<script src="js/main.js"></script>
</body>
</html>
