<div class="section-header">
  <div class="section-title">ประวัติการบันทึก</div>
  <div class="section-sub">ข้อมูลถูกบันทึกไว้ในเครื่องของคุณ</div>
</div>

<div class="card">
  <div id="history-list">
    <div class="empty-state" style="padding:40px 0">
      <div class="empty-state-icon">—</div>
      ยังไม่มีประวัติ กด "บันทึกวันนี้" เพื่อเริ่มต้น
    </div>
  </div>
</div>

<div class="grid-3" style="margin-top:14px">
  <div class="stat-chip">
    <div class="s-label">วันที่บันทึก</div>
    <div class="s-value" id="hist-days" style="color:var(--accent)">0</div>
  </div>
  <div class="stat-chip">
    <div class="s-label">เฉลี่ย/วัน</div>
    <div class="s-value" id="hist-avg" style="color:var(--blue)">– <span class="s-unit">kcal</span></div>
  </div>
  <div class="stat-chip">
    <div class="s-label">สูงสุด</div>
    <div class="s-value" id="hist-max" style="color:var(--amber)">– <span class="s-unit">kcal</span></div>
  </div>
</div>
